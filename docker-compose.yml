version: "3.9"

services:
  cinema-guess:
    build:
      context: .
      dockerfile: Dockerfile
    image: cinema-guess:latest
    container_name: cinema-guess
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
